global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "transmission"
    static_configs:
      - targets: ["192.168.50.41:19091"]

  - job_name: "vpn-monitor"
    static_configs:
      - targets: ["192.168.50.41:9877"]

  - job_name: "pub-quiz"
    static_configs:
      - targets: ["192.168.50.41:5000"]

  - job_name: "heating"
    static_configs:
      # Scraped over the shared caddy_shared network by container name.
      - targets: ["heating:8000"]
